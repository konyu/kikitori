# VoiceToText log rotation — installed to /etc/newsyslog.d/
# Rotates when file exceeds 1MB, keeps 3 compressed backups
#
# Install:
#   sudo cp voicetotext.newsyslog.conf /etc/newsyslog.d/voicetotext.conf
#   sudo newsyslog -C  # verify syntax

/tmp/voicetotext.log       501  staff  644  3  1024  *  JN
/tmp/voicetotext.err       501  staff  644  3  1024  *  JN
