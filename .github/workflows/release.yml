name: Build and Release Bottle

on:
  push:
    tags:
      - 'v*'

jobs:
  build-bottle:
    runs-on: macos-14 # Uses arm64 (Apple Silicon)
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Homebrew
        id: set-up-homebrew
        uses: Homebrew/actions/setup-homebrew@master

      - name: Extract version
        id: get_version
        run: echo "VERSION=${GITHUB_REF#refs/tags/v}" >> $GITHUB_ENV

      - name: Install dependencies
        run: |
          brew install python@3.13 ffmpeg portaudio
          
      - name: Build bottle
        run: |
          set -e
          CELLAR_DIR="kikitori/${{ env.VERSION }}"
          mkdir -p "$CELLAR_DIR"

          echo "=== venv ==="
          brew --prefix python@3.13
          PYTHON_BIN="$(brew --prefix python@3.13)/bin/python3.13"
          "$PYTHON_BIN" -m venv "$CELLAR_DIR/libexec"

          echo "=== pip upgrade ==="
          "$CELLAR_DIR/libexec/bin/pip" install --upgrade pip

          echo "=== pip install deps ==="
          "$CELLAR_DIR/libexec/bin/pip" install -r requirements.txt

          echo "=== copy files ==="
          find . -mindepth 1 -maxdepth 1 \( ! -name '.git' -a ! -name 'kikitori' \) -print0 | while IFS= read -r -d '' f; do
              cp -a "$f" "$CELLAR_DIR/libexec/"
          done
          # Ensure kikitori python package dir is copied into libexec
          cp -a kikitori "$CELLAR_DIR/libexec/"

          echo "=== Create launcher ==="
          mkdir -p "$CELLAR_DIR/bin"
          cat > "$CELLAR_DIR/bin/kikitori" << 'LAUNCHER'
          #!/bin/bash
          exec "/opt/homebrew/Cellar/kikitori/${{ env.VERSION }}/libexec/bin/python" "/opt/homebrew/Cellar/kikitori/${{ env.VERSION }}/libexec/pyside_main.py" "$@"
          LAUNCHER
          chmod +x "$CELLAR_DIR/bin/kikitori"

          echo "=== Create INSTALL_RECEIPT.json ==="
          python3 -c "
          import json, time
          receipt = {
              'homebrew_version': '5.0.4', 'used_options': [], 'unused_options': [],
              'built_as_bottle': True, 'poured_from_bottle': False, 'loaded_from_api': False,
              'installed_as_dependency': False, 'installed_on_request': True,
              'changed_files': [], 'time': int(time.time()), 'source_modified_time': int(time.time()),
              'compiler': 'clang', 'aliases': [], 'runtime_dependencies': [],
              'source': {'path': '/opt/homebrew/Library/Taps/konyu/homebrew-kikitori/Formula/kikitori.rb', 'tap': 'konyu/kikitori', 'spec': 'stable', 'versions': {'stable': '${{ env.VERSION }}'}},
              'stdlib': 'libc++', 'arch': 'arm64',
          }
          with open('$CELLAR_DIR/INSTALL_RECEIPT.json', 'w') as f:
              json.dump(receipt, f, indent=2)
          "

          echo "=== Compress bottle ==="
          # macos-14 runs on macOS Sonoma (14.x) or higher, we target arm64_sonoma
          # or we can name it arm64_sequoia if we want, but Homebrew tags bottles by runner OS
          # macos-14 runner is M1.
          BOTTLE_NAME="kikitori-${{ env.VERSION }}.arm64_sonoma.bottle.tar.gz"
          tar czf "$BOTTLE_NAME" kikitori/
          
          # Calculate SHA256
          BOTTLE_SHA=$(shasum -a 256 "$BOTTLE_NAME" | cut -d' ' -f1)
          
          echo "BOTTLE_NAME=$BOTTLE_NAME" >> $GITHUB_ENV
          echo "BOTTLE_SHA=$BOTTLE_SHA" >> $GITHUB_ENV
          
      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          files: ${{ env.BOTTLE_NAME }}
          draft: false
          prerelease: false
          generate_release_notes: true

  update-tap:
    needs: build-bottle
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Tap Repo
        uses: actions/checkout@v4
        with:
          repository: konyu/homebrew-kikitori
          token: ${{ secrets.TAP_GITHUB_TOKEN }}
          path: tap

      - name: Update Formula
        run: |
          cd tap
          VERSION=${GITHUB_REF#refs/tags/v}
          
          # Get the release data via GH API
          RELEASE_JSON=$(curl -s -H "Authorization: token ${{ secrets.TAP_GITHUB_TOKEN }}" \
            "https://api.github.com/repos/konyu/kikitori/releases/tags/v$VERSION")
            
          # Extract download URL and size (we need sha256. since we don't have it here directly, 
          # we can fetch the sha256 or pass it as an artifact, but simpler is computing it after download)
          
          BOTTLE_URL="https://github.com/konyu/kikitori/releases/download/v$VERSION/kikitori-$VERSION.arm64_sonoma.bottle.tar.gz"
          curl -sL -o bottle.tar.gz "$BOTTLE_URL"
          BOTTLE_SHA=$(sha256sum bottle.tar.gz | cut -d' ' -f1)
          
          echo "BOTTLE_SHA=$BOTTLE_SHA"
          
          # Update version and tag
          sed -i "s/tag: *\"v[^\"]*\"/tag:      \"v$VERSION\"/" Formula/kikitori.rb
          sed -i "s/revision: *\"[^\"]*\"/revision: \"$GITHUB_SHA\"/" Formula/kikitori.rb
          
          # Update bottle hash for arm64_sonoma (or arm64_sequoia if you want to keep the name)
          # We'll use a python script to cleanly update the bottle block
          python3 -c "
          import re
          with open('Formula/kikitori.rb', 'r') as f: text = f.read()
          text = re.sub(r'root_url\s+\"[^\"]+\"', f'root_url \"https://github.com/konyu/kikitori/releases/download/v$VERSION\"', text)
          text = re.sub(r'sha256\s+arm64_(sequoia|sonoma):\s+\"[^\"]+\"', f'sha256 arm64_sonoma: \"$BOTTLE_SHA\"', text)
          with open('Formula/kikitori.rb', 'w') as f: f.write(text)
          "
          
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add Formula/kikitori.rb
          git commit -m "Update kikitori to v$VERSION"
          git push origin main
