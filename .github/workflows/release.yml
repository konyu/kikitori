name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: read

jobs:
  update-homebrew-formula:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout app repo
        uses: actions/checkout@v4

      - name: Calculate tarball SHA256
        id: sha
        run: |
          TAG="${GITHUB_REF#refs/tags/}"
          URL="https://github.com/${{ github.repository }}/archive/refs/tags/${TAG}.tar.gz"
          echo "Downloading ${URL} ..."
          curl -sL "${URL}" -o /tmp/source.tar.gz
          SHA=$(sha256sum /tmp/source.tar.gz | awk '{print $1}')
          echo "sha256=${SHA}" >> "$GITHUB_OUTPUT"
          echo "tag=${TAG}" >> "$GITHUB_OUTPUT"
          echo "url=${URL}" >> "$GITHUB_OUTPUT"
          echo "SHA256: ${SHA}"

      - name: Checkout homebrew tap
        uses: actions/checkout@v4
        with:
          repository: konyu/homebrew-kikitori
          token: ${{ secrets.HOMEBREW_TAP_TOKEN }}
          path: homebrew-kikitori

      - name: Update Formula
        run: |
          TAG="${{ steps.sha.outputs.tag }}"
          SHA="${{ steps.sha.outputs.sha256 }}"
          FILE="homebrew-kikitori/Formula/kikitori.rb"

          sed -i "s|url \"https://github.com/konyu/kikitori/archive/refs/tags/v.*.tar.gz\"|url \"https://github.com/konyu/kikitori/archive/refs/tags/${TAG}.tar.gz\"|" "$FILE"
          sed -i "s|sha256 \".*\"|sha256 \"${SHA}\"|" "$FILE"

          echo "Updated Formula:"
          head -6 "$FILE"

      - name: Commit and push
        working-directory: homebrew-kikitori
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add Formula/kikitori.rb
          git commit -m "bump: ${{ steps.sha.outputs.tag }}"
          git push origin main