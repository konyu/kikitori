name: Deploy Webpage to Cloudflare Workers

on:
  push:
    branches: ["main"]
    paths:
      - "webpage/**"
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Install Wrangler
        run: npm install -g wrangler

      - name: Verify auth & show account
        working-directory: webpage
        run: |
          wrangler whoami
          wrangler versions list --name kikitori_webpage || true
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}

      - name: Deploy
        working-directory: webpage
        run: wrangler deploy
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
